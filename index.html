<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LANKED LAB - Studio de Desenvolvimento de Jogos Indie.">
    <title>LANKED LAB | Game Studio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-glow"></div>

    <main class="container">
        <div class="status-badge">Lançaremos em Breve!</div>
        <h1>LANKED LAB</h1>
        <p>Criando experiências imersivas e mundos digitais de alta performance.</p>
        
        <nav class="links">
            <a href="#">Games</a>
            <a href="#">X (Twitter)</a>
            <a href="#">LinkedIn</a>
            <a href="mailto:contactlanked@gmail.com">Contato</a>
        </nav>
    </main>

    <script>
        const glow = document.querySelector('.bg-glow');
        
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            glow.style.left = x + 'px';
            glow.style.top = y + 'px';
        });
    </script>

</body>
</html>
